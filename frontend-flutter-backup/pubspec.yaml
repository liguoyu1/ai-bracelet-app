name: bracelet_web
description: Bracelet Customization Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.0
  intl: ^0.19.0
  cached_network_image: ^3.3.0
  url_launcher: ^6.2.0
  image_picker: ^1.0.0
  flutter_colorpicker: ^1.0.0
  google_fonts: ^6.1.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
