<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="bracelet_web">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>bracelet_web</title>
  <link rel="manifest" href="manifest.json">
  <style>
    #loading { position:fixed; inset:0; background:#0A0A0A; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition:opacity .5s; }
    #loading.fade-out { opacity:0; pointer-events:none; }
    .loading-spinner { width:40px; height:40px; border:3px solid #333; border-top-color:#C8A45C; border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-text { color:#F5F0E8; font-family:Georgia,serif; font-size:18px; margin-top:20px; letter-spacing:4px; }
    .loading-sub { color:#F5F0E8; font-family:Helvetica,sans-serif; font-size:12px; margin-top:8px; opacity:.5; }
    #webgl-error { display:none; position:fixed; inset:0; background:#0A0A0A; z-index:99999; flex-direction:column; align-items:center; justify-content:center; padding:40px; text-align:center; }
    #webgl-error h2 { color:#C8A45C; font-family:Georgia,serif; font-size:24px; margin-bottom:16px; }
    #webgl-error p { color:#F5F0E8; font-family:Helvetica,sans-serif; font-size:14px; line-height:1.6; opacity:.7; max-width:400px; }
    #loading-timeout { display:none; margin-top:24px; text-align:center; }
    #loading-timeout p { color:#F5F0E8; font-family:Helvetica,sans-serif; font-size:12px; opacity:.6; }
    #loading-timeout a { color:#C8A45C; text-decoration:underline; cursor:pointer; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">AURA</div>
    <div class="loading-sub">Loading…</div>
  </div>
  <div id="webgl-error">
    <h2>Browser Not Supported</h2>
    <p>This app requires WebGL 2.0. Please open in Safari or Chrome on a modern device.</p>
  </div>
  <div id="loading-timeout">
    <p>Still loading… <a href="javascript:location.reload(true)">refresh</a> if stuck</p>
  </div>
  <script>
    (function(){
      var c = document.createElement('canvas');
      var gl2 = c.getContext('webgl2');
      if (!gl2) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('webgl-error').style.display = 'flex';
      } else {
        // Show loading hint after 45s (don't hide spinner, just add message)
        setTimeout(function(){
          var el = document.getElementById('loading-timeout');
          if (el) el.style.display = 'block';
        }, 45000);
      }
    })();
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
